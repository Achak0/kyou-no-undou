<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f5f0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>きょうの運動</title>
<style>
  :root{
    --bg:#f7f5f0;
    --card:#ffffff;
    --ink:#3a3a3a;
    --sub:#8a8578;
    --accent:#69a297;
    --accent-deep:#578e83;
    --green:#7fae8e;
    --line:#e8e4da;
    --easy:#8fb8a8;
    --mid:#e8b04b;
    --hard:#d97b63;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;
  }
  .app{max-width:480px;margin:0 auto;padding:16px 16px 90px;}

  /* ---------- header ---------- */
  header{padding:12px 4px 18px;}
  header h1{font-size:22px;font-weight:700;letter-spacing:.05em;}
  header p{font-size:12px;color:var(--sub);margin-top:4px;}

  /* ---------- steps indicator ---------- */
  .stepbar{display:flex;gap:6px;margin:0 4px 16px;}
  .stepbar span{flex:1;height:4px;border-radius:2px;background:var(--line);transition:background .3s;}
  .stepbar span.on{background:var(--accent);}

  /* ---------- generic ---------- */
  .screen{display:none;}
  .screen.active{display:block;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .q{font-size:17px;font-weight:700;margin:4px 4px 14px;}
  .q small{display:block;font-size:12px;font-weight:400;color:var(--sub);margin-top:4px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid1{display:grid;grid-template-columns:1fr;gap:10px;}

  .opt{
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    padding:18px 12px;text-align:center;font-size:16px;font-weight:600;
    cursor:pointer;transition:transform .1s, border-color .15s;
    user-select:none;
  }
  .opt:active{transform:scale(.97);}
  .opt .emoji{display:block;font-size:26px;margin-bottom:6px;}
  .opt .emoji svg{width:42px;height:42px;}
  .opt .note{display:block;font-size:11px;font-weight:400;color:var(--sub);margin-top:4px;}
  .opt.sel{border-color:var(--accent);background:#e9f1ef;}

  .backbtn{
    display:inline-block;margin:16px 4px 0;font-size:13px;color:var(--sub);
    background:none;border:none;cursor:pointer;padding:8px;
  }

  /* ---------- menu screen ---------- */
  .summary{
    display:flex;gap:8px;flex-wrap:wrap;margin:0 4px 14px;
  }
  .chip{
    font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px;
    background:var(--card);border:1px solid var(--line);color:var(--ink);
  }
  .chip.c-easy{background:#eef5f1;border-color:var(--easy);color:#4e7a67;}
  .chip.c-mid{background:#fbf3e2;border-color:var(--mid);color:#9c7420;}
  .chip.c-hard{background:#fbeae5;border-color:var(--hard);color:#b05a44;}
  .chip svg{width:11px;height:11px;margin-right:2px;vertical-align:-1px;}

  .roundinfo{
    background:#f0ece3;border-radius:12px;padding:10px 14px;font-size:13px;
    color:#6b6555;margin:0 0 14px;line-height:1.6;
  }

  .ex{
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    margin-bottom:10px;overflow:hidden;
  }
  .ex-head{
    display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;user-select:none;
  }
  .ex-num{
    width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;
  }
  .ex-title{flex:1;}
  .ex-title .name{font-size:15px;font-weight:700;line-height:1.4;}
  .ex-title .meta{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .ex-arrow{color:var(--sub);font-size:12px;transition:transform .2s;}
  .ex.open .ex-arrow{transform:rotate(90deg);}
  .ex-body{display:none;padding:0 14px 14px;border-top:1px dashed var(--line);}
  .ex.open .ex-body{display:block;}
  .ex-body ol{margin:12px 0 0 4px;padding-left:18px;}
  .ex-body li{font-size:13.5px;line-height:1.8;margin-bottom:4px;}
  .ex-tip{
    margin-top:10px;background:#f4f7f3;border-radius:10px;padding:10px 12px;
    font-size:12.5px;color:#557262;line-height:1.7;
  }
  .ex-tip::before{content:"💡 ";}

  .tagchip{
    display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;margin-right:6px;
  }
  .tag-stretch{background:#eef5f1;color:#4e7a67;}
  .tag-strength{background:#fbeae5;color:#b05a44;}

  .donebtn{
    width:100%;margin-top:16px;padding:16px;border:none;border-radius:16px;
    background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;
    font-family:inherit;
  }
  .donebtn:active{background:var(--accent-deep);}

  /* ---------- done screen ---------- */
  .donecard{
    background:var(--card);border-radius:20px;padding:36px 20px;text-align:center;
    border:1.5px solid var(--line);
  }
  .donecard .big{font-size:44px;}
  .donecard h2{font-size:19px;margin:12px 0 6px;}
  .donecard p{font-size:13px;color:var(--sub);line-height:1.7;}

  /* ---------- history ---------- */
  .stat{
    display:flex;gap:10px;margin-bottom:14px;
  }
  .stat .box{
    flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:14px;
    padding:14px;text-align:center;
  }
  .stat .num{font-size:24px;font-weight:700;color:var(--accent-deep);}
  .stat .lbl{font-size:11px;color:var(--sub);margin-top:2px;}
  .log{
    background:var(--card);border:1.5px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
  }
  .log .date{font-size:12px;color:var(--sub);width:74px;flex-shrink:0;}
  .log .what{flex:1;font-size:14px;font-weight:600;}
  .log .what small{display:block;font-size:11px;font-weight:400;color:var(--sub);margin-top:2px;}
  .log .del{border:none;background:none;color:#c9c3b6;font-size:16px;cursor:pointer;padding:4px;}
  .log .what svg{width:14px;height:14px;margin-right:3px;vertical-align:-2px;}
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:40px 0;line-height:1.8;}
  .storagenote{
    margin:16px 4px 0;font-size:11.5px;color:var(--sub);line-height:1.8;
    background:#f0ece3;border-radius:10px;padding:10px 14px;
  }

  /* ---------- tabbar ---------- */
  nav{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;max-width:480px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;border:none;background:none;padding:10px 0 12px;cursor:pointer;
    font-family:inherit;font-size:11px;color:var(--sub);
  }
  nav button .ic{display:block;font-size:20px;margin-bottom:2px;}
  nav button .ic svg{width:21px;height:21px;}
  nav button.on{color:var(--accent-deep);font-weight:700;}
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>きょうの運動 <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#7fae8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M5 21c.5-8 5-13 14-16-1 9-5.5 14-12.5 15.5"/><path d="M5 21c3-4.5 6.5-7.5 10-9"/></svg></h1>
    <p>気になるところを、今日のペースで。</p>
  </header>

  <!-- ===== main flow ===== -->
  <div id="tab-main">
    <div class="stepbar" id="stepbar">
      <span class="on"></span><span></span><span></span><span></span>
    </div>

    <!-- STEP 1: part -->
    <section class="screen active" id="s-part">
      <div class="q">どこが気になりますか?</div>
      <div class="grid2" id="partGrid"></div>
    </section>

    <!-- STEP 2: time -->
    <section class="screen" id="s-time">
      <div class="q">どのくらい時間をとれますか?</div>
      <div class="grid1" id="timeGrid"></div>
      <button class="backbtn" onclick="goStep(1)">← もどる</button>
    </section>

    <!-- STEP 3: intensity -->
    <section class="screen" id="s-intensity">
      <div class="q">今日はどんな日ですか?</div>
      <div class="grid1" id="intGrid"></div>
      <button class="backbtn" onclick="goStep(2)">← もどる</button>
    </section>

    <!-- STEP 4: menu -->
    <section class="screen" id="s-menu">
      <div class="summary" id="menuSummary"></div>
      <div class="roundinfo" id="roundInfo"></div>
      <div class="q" style="margin-bottom:10px;">きょうのメニュー <small>種目名をタップすると、やり方が見られます</small></div>
      <div id="exList"></div>
      <button class="donebtn" onclick="recordDone()"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px"><path d="M4 12.5l5.5 5.5L20 6.5"/></svg>できた!を記録する</button>
      <button class="backbtn" onclick="goStep(3)">← 条件を変える</button>
    </section>

    <!-- STEP 5: done -->
    <section class="screen" id="s-done">
      <div class="donecard">
        <div class="big"><svg viewBox="0 0 48 48" width="64" height="64" fill="none" stroke="#7fae8e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="24" r="20"/><path d="M15 24l6.5 6.5L33 18"/></svg></div>
        <h2>おつかれさまでした!</h2>
        <p id="doneMsg"></p>
      </div>
      <button class="donebtn" style="background:var(--green);" onclick="goStep(1)">はじめの画面にもどる</button>
    </section>
  </div>

  <!-- ===== history tab ===== -->
  <div id="tab-history" style="display:none;">
    <div class="stat">
      <div class="box"><div class="num" id="statMonth">0</div><div class="lbl">今月の回数</div></div>
      <div class="box"><div class="num" id="statTotal">0</div><div class="lbl">これまでの合計</div></div>
      <div class="box"><div class="num" id="statStreak">0</div><div class="lbl">連続日数</div></div>
    </div>
    <div id="logList"></div>
    <p class="storagenote">🔒 記録はこの端末(ブラウザ)の中だけに保存されます。アプリを閉じても消えませんが、ブラウザの「履歴・サイトデータの消去」をすると記録も消えるのでご注意ください。</p>
  </div>

</div>

<nav>
  <button class="on" id="navMain" onclick="switchTab('main')"><span class="ic"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 24h16"/><rect x="8" y="15" width="6" height="18" rx="2"/><rect x="34" y="15" width="6" height="18" rx="2"/><path d="M4 20v8M44 20v8"/></svg></span>運動する</button>
  <button id="navHistory" onclick="switchTab('history')"><span class="ic"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 39a5 5 0 0 1 5-5h27"/><path d="M13 4h27v40H13a5 5 0 0 1-5-5V9a5 5 0 0 1 5-5z"/></svg></span>きろく</button>
</nav>

<script>
/* =====================================================
   運動データベース
   type: stretch(ストレッチ系) / strength(筋トレ系)
===================================================== */
const EX = {
  /* --- 首 --- */
  neck_ff:{name:"首を前後にゆっくり倒す",type:"stretch",time:"前後 各20秒×2",steps:[
    "背すじを伸ばして座る(立ってもOK)",
    "息を吐きながら、あごを胸に近づけるように首を前へゆっくり倒す",
    "20秒キープしたら、今度は天井を見るようにゆっくり後ろへ",
    "痛気持ちいいところで止めるのがコツ。反動はつけない"],
    tip:"呼吸は止めずに。後ろに倒すときはあごを突き上げすぎないように。"},
  neck_side:{name:"首を左右に倒す",type:"stretch",time:"左右 各30秒",steps:[
    "背すじを伸ばし、肩の力を抜く",
    "右耳を右肩に近づけるように、頭をゆっくり真横に倒す",
    "首の左側が伸びるのを感じながら30秒キープ",
    "反対側も同じように"],
    tip:"倒した側と反対の肩が上がりやすいので、下げる意識を。"},
  neck_roll:{name:"首回し",type:"stretch",time:"左右 各5周",steps:[
    "あごを引いて、まず首を前に倒す",
    "そこから大きな円を描くように、ゆっくり右回りに5周",
    "左回りも同じく5周"],
    tip:"目が回らないよう、とにかくゆっくり。痛む角度は飛ばしてOK。"},
  shrug_drop:{name:"肩すくめ(上げてストン)",type:"stretch",time:"10回",steps:[
    "両肩を耳に近づけるようにグーッとすくめる",
    "3秒キープしたら、力を抜いて一気にストンと落とす",
    "これを10回繰り返す"],
    tip:"落とすときに「ふーっ」と息を吐くとリラックス効果アップ。"},
  chin_tuck:{name:"あご引き(二重あご体操)",type:"strength",time:"10回",steps:[
    "背すじを伸ばして正面を向く",
    "頭の位置は変えずに、あごだけを後ろに水平スライド(二重あごを作るイメージ)",
    "3秒キープして戻す。これを10回"],
    tip:"スマホ首(ストレートネック)対策の定番。上を向いたり下を向いたりしないこと。"},
  neck_side_hand:{name:"手で頭を押さえて首横伸ばし",type:"stretch",time:"左右 各30秒",steps:[
    "右手を頭の左側に添える",
    "手の重みで頭を右にゆっくり倒す(強く引っ張らない)",
    "首の左側が伸びた状態で30秒キープ",
    "反対側も同じように"],
    tip:"「引っ張る」のではなく「手の重さを乗せる」だけで十分伸びます。"},
  towel_neck:{name:"タオル首ストレッチ",type:"stretch",time:"30秒×2",steps:[
    "フェイスタオルを首の後ろに引っ掛け、両端を手で持つ",
    "タオルを斜め上前方に軽く引きながら、ゆっくり上を向く",
    "首の前側が気持ちよく伸びるところで30秒キープ"],
    tip:"タオルが首を支えてくれるので、後ろに倒すのが苦手な人でも安心。"},
  scap_squeeze:{name:"肩甲骨寄せ",type:"strength",time:"10回",steps:[
    "背すじを伸ばし、両腕を軽く後ろに引く",
    "左右の肩甲骨を背中の中心にグーッと寄せる",
    "3秒キープしてゆるめる。これを10回"],
    tip:"胸を張るイメージ。肩が上がらないように注意。"},
  chest_open_neck:{name:"胸を開いて首を斜め上に伸ばす",type:"stretch",time:"左右 各30秒",steps:[
    "両手を体の後ろで組む(組めなければ腰に当てるだけでOK)",
    "胸を開きながら、顔を左斜め上へゆっくり向ける",
    "首の右前側が伸びるのを感じて30秒。反対側も"],
    tip:"デスクワークで縮こまった首の前側〜鎖骨まわりに効きます。"},
  chin_tuck_hold:{name:"あご引きキープ",type:"strength",time:"10秒×5回",steps:[
    "壁に背中と後頭部を軽くつけて立つ",
    "あごを引いて、後頭部を壁に押し付けるように力を入れる",
    "10秒キープ×5回"],
    tip:"首の深いところの筋肉を鍛えて、良い姿勢を保ちやすくします。"},
  iso_front:{name:"手と頭で押し合い(前)",type:"strength",time:"10秒×3回",steps:[
    "両手のひらをおでこに当てる",
    "頭は前に倒そうとし、手はそれを押し返す(実際には動かない)",
    "力比べの状態で10秒キープ×3回"],
    tip:"動かさずに力を入れるトレーニング。首を痛めにくい安全な鍛え方です。"},
  iso_back:{name:"手と頭で押し合い(後ろ)",type:"strength",time:"10秒×3回",steps:[
    "両手を組んで後頭部に当てる",
    "頭は後ろに倒そうとし、手はそれを押し返す",
    "10秒キープ×3回。呼吸は止めない"],
    tip:"力は6〜7割で十分。プルプルするほど頑張らなくてOK。"},
  iso_side:{name:"手と頭で押し合い(左右)",type:"strength",time:"左右 各10秒×2回",steps:[
    "右手のひらを右こめかみに当てる",
    "頭は右に倒そうとし、手は押し返す。10秒キープ",
    "左側も同じように。各2回ずつ"],
    tip:"首がグラグラ動かないよう、じわーっと力を入れるのがポイント。"},
  towel_chin:{name:"タオル抵抗あご引き",type:"strength",time:"10回",steps:[
    "タオルを後頭部に引っ掛け、両端を前方向に軽く引く",
    "タオルの抵抗に逆らって、あごを引きながら頭を後ろへ押す",
    "3秒キープして戻す×10回"],
    tip:"あご引き体操の強化版。タオルの引きは軽めからスタート。"},
  slow_shrug:{name:"肩すくめゆっくり",type:"strength",time:"10回",steps:[
    "3秒かけて両肩を耳に近づけるように上げる",
    "上で1秒キープ",
    "3秒かけてゆっくり下ろす。これを10回"],
    tip:"ペットボトルを両手に持つと負荷アップ。首すじ〜肩の筋トレです。"},

  /* --- 肩 --- */
  shoulder_roll:{name:"肩回し(前・後ろ)",type:"stretch",time:"前後 各10周",steps:[
    "指先を軽く肩に添える(伸ばしたままでもOK)",
    "ひじで大きな円を描くように、後ろ回しに10周",
    "前回しも10周"],
    tip:"「ひじで円を描く」と意識すると肩甲骨までしっかり動きます。"},
  arm_dangle:{name:"腕ぶらぶら",type:"stretch",time:"30秒×2",steps:[
    "立って上半身の力を完全に抜く",
    "体を軽く左右にひねり、その勢いで両腕を鞭のようにぶらぶらさせる",
    "30秒×2セット"],
    tip:"頑張らないのがコツ。血行が良くなって肩がじんわり温まります。"},
  wall_chest:{name:"壁に手をついて胸開き",type:"stretch",time:"左右 各30秒",steps:[
    "壁の横に立ち、右手のひらを肩の高さで壁につける",
    "そのまま体を左にゆっくりひねる",
    "右胸〜肩の前側が伸びたところで30秒。反対側も"],
    tip:"巻き肩対策の定番。手の高さを変えると伸びる場所が変わります。"},
  towel_pull_squeeze:{name:"タオル引っ張り肩甲骨寄せ",type:"strength",time:"10回",steps:[
    "タオルの両端を持ち、腕を前に伸ばす",
    "タオルを左右に引っ張り合いながら、ひじを曲げて胸に引き寄せる",
    "肩甲骨をギュッと寄せて3秒キープ、戻す×10回"],
    tip:"タオルを引っ張り合う力は抜かないまま動かすのがポイント。"},
  wall_pushup:{name:"壁腕立て伏せ",type:"strength",time:"10回×2",steps:[
    "壁から一歩離れて立ち、肩幅より少し広く壁に両手をつく",
    "ひじを曲げて、胸を壁に近づける",
    "壁を押して元に戻る。10回×2セット"],
    tip:"体は頭からかかとまで一直線に。楽なら壁から足を遠ざけると負荷アップ。"},
  banzai_w:{name:"バンザイ→ひじ引き下げ(W運動)",type:"strength",time:"10回",steps:[
    "両腕をバンザイのようにまっすぐ上げる",
    "ひじを曲げながら、体の横へゆっくり引き下げる(腕でWの字を作るイメージ)",

/* ===================================================== */
let sel = {part:null, time:null, intensity:null};

function goStep(n){
  document.querySelectorAll("#tab-main .screen").forEach(s=>s.classList.remove("active"));
  const ids=["s-part","s-time","s-intensity","s-menu","s-done"];
  document.getElementById(ids[n-1]).classList.add("active");
  const bars=document.querySelectorAll("#stepbar span");
  bars.forEach((b,i)=>b.classList.toggle("on", i < Math.min(n,4)));
  window.scrollTo(0,0);
}

function renderChoices(){
  const pg=document.getElementById("partGrid");
  pg.innerHTML = PARTS.map(p=>`
    <div class="opt" onclick="pick('part','${p.key}')"><span class="emoji">${p.icon}</span>${p.key}</div>`).join("");
  const tg=document.getElementById("timeGrid");
  tg.innerHTML = TIMES.map(t=>`
    <div class="opt" onclick="pick('time',${t.key})">${t.label}<span class="note">${t.note}</span></div>`).join("");
  const ig=document.getElementById("intGrid");
  ig.innerHTML = INTENSITIES.map(i=>`
    <div class="opt" onclick="pick('intensity','${i.key}')"><span class="emoji">${i.icon}</span>${i.label}<span class="note">${i.note}</span></div>`).join("");
}

function pick(kind,val){
  sel[kind]=val;
  if(kind==="part") goStep(2);
  else if(kind==="time") goStep(3);
  else { renderMenu(); goStep(4); }
}

function renderMenu(){
  const inten = INTENSITIES.find(i=>i.key===sel.intensity);
  const time = TIMES.find(t=>t.key===sel.time);
  document.getElementById("menuSummary").innerHTML = `
    <span class="chip">${ICON_PIN} ${sel.part}</span>
    <span class="chip">${ICON_CLOCK} ${time.label}</span>
    <span class="chip ${inten.cls}">${inten.icon} ${inten.label}</span>`;
  const rounds = sel.time/10;
  document.getElementById("roundInfo").textContent =
    rounds===1 ? "下の5種目を、上から順番に1周やりましょう。"
    : `下の5種目を、上から順番に${rounds}周やりましょう。${rounds===3?"3周目は少しペースを落として、最後は深呼吸で終わると◎":"2周目は1周目よりていねいに動くのがコツ。"}`;
  const ids = MENUS[sel.part][sel.intensity];
  document.getElementById("exList").innerHTML = ids.map((id,i)=>{
    const e=EX[id];
    return `<div class="ex" id="ex-${i}">
      <div class="ex-head" onclick="document.getElementById('ex-${i}').classList.toggle('open')">
        <div class="ex-num">${i+1}</div>
        <div class="ex-title">
          <div class="name">${e.name}</div>
          <div class="meta"><span class="tagchip ${e.type==='stretch'?'tag-stretch':'tag-strength'}">${e.type==='stretch'?'ストレッチ':'筋トレ'}</span>${e.time}</div>
        </div>
        <div class="ex-arrow">▶</div>
      </div>
      <div class="ex-body">
        <ol>${e.steps.map(s=>`<li>${s}</li>`).join("")}</ol>
        <div class="ex-tip">${e.tip}</div>
      </div>
    </div>`;
  }).join("");
}

/* ---------- record ---------- */
function loadLog(){ try{return JSON.parse(localStorage.getItem("exlog")||"[]");}catch(e){return [];} }
function saveLog(l){ localStorage.setItem("exlog",JSON.stringify(l)); }

function recordDone(){
  const log=loadLog();
  log.unshift({d:new Date().toISOString(), part:sel.part, time:sel.time, intensity:sel.intensity});
  saveLog(log);
  const inten=INTENSITIES.find(i=>i.key===sel.intensity);
  document.getElementById("doneMsg").textContent =
    `${sel.part}・${sel.time}分・${inten.label} を記録しました。今日も体をいたわれましたね。`;
  goStep(5);
}

function renderHistory(){
  const log=loadLog();
  const now=new Date();
  const thisMonth=log.filter(e=>{
    const d=new Date(e.d);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  }).length;
  document.getElementById("statMonth").textContent=thisMonth;
  document.getElementById("statTotal").textContent=log.length;
  // streak
  const days=[...new Set(log.map(e=>new Date(e.d).toDateString()))];
  let streak=0, cur=new Date();
  while(days.includes(cur.toDateString())){ streak++; cur.setDate(cur.getDate()-1); }
  document.getElementById("statStreak").textContent=streak;

  const list=document.getElementById("logList");
  if(log.length===0){
    list.innerHTML=`<div class="empty">まだ記録がありません。<br>運動が終わったら「できた!」ボタンで記録しましょう 🌱</div>`;
    return;
  }
  list.innerHTML = log.map((e,i)=>{
    const d=new Date(e.d);
    const inten=INTENSITIES.find(x=>x.key===e.intensity);
    return `<div class="log">
      <div class="date">${d.getMonth()+1}/${d.getDate()} ${["日","月","火","水","木","金","土"][d.getDay()]}<br>${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}</div>
      <div class="what">${inten.icon} ${e.part} <small>${e.time}分・${inten.label}</small></div>
      <button class="del" onclick="delLog(${i})">✕</button>
    </div>`;
  }).join("");
}

function delLog(i){
  if(!confirm("この記録を削除しますか?")) return;
  const log=loadLog(); log.splice(i,1); saveLog(log); renderHistory();
}

/* ---------- tabs ---------- */
function switchTab(t){
  document.getElementById("tab-main").style.display = t==="main"?"block":"none";
  document.getElementById("tab-history").style.display = t==="history"?"block":"none";
  document.getElementById("navMain").classList.toggle("on",t==="main");
  document.getElementById("navHistory").classList.toggle("on",t==="history");
  if(t==="history") renderHistory();
  window.scrollTo(0,0);
}

renderChoices();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
